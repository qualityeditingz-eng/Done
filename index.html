<body>
    <div class="container">
        <div class="header">
            <h1>COLOR SCAN</h1>
            <p>Detect Colors • Get Tasks</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="camera-wrapper">
            <video id="videoStream" playsinline autoplay></video>
            <div class="detection-overlay">
                <div class="corner-mark corner-tl"></div>
                <div class="corner-mark corner-tr"></div>
                <div class="corner-mark corner-bl"></div>
                <div class="corner-mark corner-br"></div>
            </div>
        </div>

        <div class="button-group">
            <button class="scan-btn" id="scanBtn">SCAN</button>
            <button class="reset-btn" id="resetBtn">RESET</button>
        </div>

        <div class="result-box" id="resultBox">
            <div class="result-color" id="resultColor"></div>
            <div class="result-action" id="resultAction"></div>
        </div>

        <div class="status" id="status"></div>
        <div class="info-text">Position color in center box • Tap SCAN</div>
    </div>

    <canvas id="hiddenCanvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('videoStream');
        const scanBtn = document.getElementById('scanBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultBox = document.getElementById('resultBox');
        const resultColor = document.getElementById('resultColor');
        const resultAction = document.getElementById('resultAction');
        const errorMessage = document.getElementById('errorMessage');
        const status = document.getElementById('status');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');

        const colorMappings = {
            'Yellow': 'DO 300 JUMPING JACKS EVERY DAY',
            'Green': 'STUDY FOR 1 HOUR',
            'Orange': 'DEACTIVATE INSTA FOR 3 DAYS',
            'Pink': 'DO GUITAR LESSON',
            'Light Pink': 'DO 30 PUSH-UPS'
        };

        async function initCamera() {
            try {
                errorMessage.classList.remove('show');
                status.textContent = 'Initializing camera...';

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 1600 }
                    },
                    audio: false
                });

                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    status.textContent = 'Ready to scan';
                };
            } catch (err) {
                showError('Camera access denied. Please enable camera permissions and reload the page.');
                console.error('Camera error:', err);
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            status.textContent = '';
        }

        function rgbToHsv(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;

            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const delta = max - min;

            let h = 0;
            let s = 0;
            const v = max;

            if (delta !== 0) {
                s = delta / max;

                if (max === r) {
                    h = (g - b) / delta;
                    if (h < 0) h += 6;
                } else if (max === g) {
                    h = (b - r) / delta + 2;
                } else {
                    h = (r - g) / delta + 4;
                }
                h /= 6;
            }

            return { h: h * 360, s: s * 100, v: v * 100 };
        }

        function detectColor(imageData) {
            const data = imageData.data;
            const pixelCount = data.length / 4;

            let totalH = 0;
            let totalS = 0;
            let totalV = 0;
            let count = 0;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // Skip very dark or very bright pixels (likely noise or reflection)
                const brightness = (r + g + b) / 3;
                if (brightness < 20 || brightness > 240) continue;

                const hsv = rgbToHsv(r, g, b);
                totalH += hsv.h;
                totalS += hsv.s;
                totalV += hsv.v;
                count++;
            }

            if (count === 0) {
                return null;
            }

            const avgH = totalH / count;
            const avgS = totalS / count;
            const avgV = totalV / count;

            // Require minimum saturation for color detection
            if (avgS < 25) {
                return null;
            }

            // Color detection based on hue ranges
            if (avgH >= 40 && avgH <= 65) {
                return 'Yellow';
            } else if (avgH >= 100 && avgH <= 150) {
                return 'Green';
            } else if (avgH >= 15 && avgH < 40) {
                return 'Orange';
            } else if (avgH >= 320 && avgH <= 360) {
                // Deep pink
                if (avgS > 50 && avgV > 40) {
                    return 'Pink';
                }
                return null;
            } else if (avgH >= 300 && avgH < 320) {
                // Light pink
                if (avgS < 60 && avgV > 60) {
                    return 'Light Pink';
                }
                return 'Pink';
            }

            return null;
        }

        function captureAndAnalyze() {
            if (!video.srcObject) {
                showError('Camera not initialized');
                return;
            }

            // Draw video frame to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Calculate detection box area (center 120px box scaled to canvas)
            const videoWidth = video.offsetWidth;
            const videoHeight = video.offsetHeight;
            const boxSize = 120;
            const scaleX = canvas.width / videoWidth;
            const scaleY = canvas.height / videoHeight;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const boxHalfSize = (boxSize * scaleX) / 2;

            const startX = centerX - boxHalfSize;
            const startY = centerY - boxHalfSize;
            const boxWidth = boxHalfSize * 2;
            const boxHeight = boxHalfSize * 2;

            // Extract image data from detection box area
            const imageData = ctx.getImageData(
                Math.max(0, startX),
                Math.max(0, startY),
                Math.min(boxWidth, canvas.width - startX),
                Math.min(boxHeight, canvas.height - startY)
            );

            const detectedColor = detectColor(imageData);

            if (detectedColor) {
                showResult(detectedColor);
                status.textContent = 'Color detected';
            } else {
                showResult(null);
                status.textContent = 'No valid color detected';
            }
        }

        function showResult(color) {
            resultBox.classList.add('show');

            if (color) {
                resultColor.textContent = color;
                resultAction.textContent = colorMappings[color];
                resultAction.className = 'result-action';
            } else {
                resultColor.textContent = 'Unknown Color';
                resultAction.textContent = 'Unable to detect a valid color. Try adjusting lighting or position.';
                resultAction.className = 'result-action result-unknown';
            }
        }

        function reset() {
            resultBox.classList.remove('show');
            errorMessage.classList.remove('show');
            status.textContent = 'Ready to scan';
        }

        scanBtn.addEventListener('click', captureAndAnalyze);
        resetBtn.addEventListener('click', reset);

        // Initialize camera on page load
        window.addEventListener('load', initCamera);

        // Handle page visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
            } else {
                initCamera();
            }
        });
    </script>
</body>
